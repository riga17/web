<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lesson33</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <form onsubmit="return validation()" method="POST">
        <div class="name-container">
            <label for="name" id="name_label">Name: </label>
            <input type="text" name="name" id="name">
            <span id="name_error">Please enter a valid name</span>
        </div>
        <br>
        <div class="age-container">
            <label for="age" id="age-label">Age:</label>
            <input type="text" name="age" id="age">
            <span id="age_error">Please enter a valid age</span>
        </div>
        <br>
        <div class="city-container">
            <label for="city" id="city_label">City:</label>
            <select name="city" id="city">
                <option value=""selected></option>
                <option value="Prishtine">Prishtine</option>
                <option value="Prizren">Prizren</option>
                <option value="Gjilan">Gjilan</option>
                <option value="Ferizaj">Ferizaj</option>
            </select>
            <span id="city_error">Please enter a valid city</span>
        </div>
        <br>

        <div class="gmail-container">
            <label for="gmail" id="gmail-label">Gmail:</label>
            <input type="text" name="gmail" id="gmail">
            <span id="gmail_error">Please enter a valid gmail</span>
        </div>
        <br>

        <button type="submit" name="submit">SEND</button>
    </form>

    <script src="main.js"></script>
</body>
</html>
